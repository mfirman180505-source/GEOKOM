<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Web GIS - Deteksi Mineral</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { text-align: center; color: #333; }
        label { font-weight: bold; margin-top: 10px; display: block; }
        input[type="file"] { margin-bottom: 20px; width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; border: none; padding: 15px; width: 100%; font-size: 16px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Deteksi Mineral Landsat 8</h2>
        <p style="text-align:center; color:#666;">Silakan unggah band citra (B2, B4, B6, B7) berformat .TIF</p>
        
        <form action="/proses" method="POST" enctype="multipart/form-data">
            <label>Upload Band 2 (Blue):</label>
            <input type="file" name="band2" accept=".TIF,.tif" required>

            <label>Upload Band 4 (Red):</label>
            <input type="file" name="band4" accept=".TIF,.tif" required>

            <label>Upload Band 6 (SWIR 1):</label>
            <input type="file" name="band6" accept=".TIF,.tif" required>

            <label>Upload Band 7 (SWIR 2):</label>
            <input type="file" name="band7" accept=".TIF,.tif" required>

            <button type="submit">Proses Analisis Mineral</button>
        </form>
    </div>
</body>
</html>
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hasil Analisis Mineral</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; text-align: center; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 90%; margin: auto; }
        img { max-width: 100%; height: auto; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 20px; }
        .btn { display: inline-block; background-color: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; margin: 5px; }
        .btn:hover { background-color: #0056b3; }
        .btn-kembali { background-color: #6c757d; }
        .btn-kembali:hover { background-color: #5a6268; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Hasil Visualisasi Analisis Mineral</h2>
        
        <img src="{{ url_for('static', filename=gambar) }}" alt="Peta Mineral">
        
        <br>
        <h3>Download Data Spasial (.TIF)</h3>
        <a href="{{ url_for('static', filename=tif_iron) }}" class="btn" download>Unduh Peta Oksida Besi</a>
        <a href="{{ url_for('static', filename=tif_clay) }}" class="btn" download>Unduh Peta Mineral Lempung</a>
        
        <br><br>
        <a href="/" class="btn btn-kembali">Kembali ke Halaman Upload</a>
    </div>
</body>
</html>
